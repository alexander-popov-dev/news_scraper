version: '3.8'

services:

  news-scraper-server:
    build:
      context: ../../
      dockerfile: deploy/scraper/Dockerfile
    command: [ "/bin/bash", "/app/entrypoint.sh" ]
    ports:
      - ${DJANGO_PORT}:${DJANGO_PORT}
    volumes:
      - ../../static:/app/static
      - ../../media:/app/media
    restart: always
    env_file:
      - ../../${APP_ENV_FILE:-.env}
    networks:
      - news-scraper-network

  news-scraper-nginx:
    image: nginx:1.25-alpine
    restart: always
    environment:
      - DJANGO_PORT=${DJANGO_PORT}
    command: >
      /bin/sh -c "envsubst '$$DJANGO_PORT'
      < /etc/nginx/nginx.conf.template
      > /etc/nginx/nginx.conf
      && nginx -g 'daemon off;'"
    volumes:
      - ../../static:/static
      - ../../media:/media
      - ./nginx/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
    ports:
      - ${NGINX_PORT}:80
    depends_on:
      - news-scraper-server
    networks:
      - news-scraper-network

  news-scraper-beat:
    build:
      context: ../../
      dockerfile: deploy/scraper/Dockerfile
    command: celery --app server beat --loglevel=info
    restart: always
    env_file:
      - ../../${APP_ENV_FILE:-.env}
    networks:
      - news-scraper-network

  news-scraper-manage-worker:
    build:
      context: ../../
      dockerfile: deploy/scraper/Dockerfile
    command: celery --app server worker -Q manage -c 1 --loglevel=info
    restart: always
    env_file:
      - ../../${APP_ENV_FILE:-.env}
    networks:
      - news-scraper-network

  news-scraper-request-worker:
    build:
      context: ../../
      dockerfile: deploy/scraper/Dockerfile
    command: celery --app server worker -Q request_scraping -c 10 --loglevel=info
    restart: always
    env_file:
      - ../../${APP_ENV_FILE:-.env}
    networks:
      - news-scraper-network

  news-scraper-browser-worker:
    build:
      context: ../../
      dockerfile: deploy/scraper/Dockerfile
    command: celery --app server worker -Q browser_scraping -c 1 --loglevel=info
    restart: always
    env_file:
      - ../../${APP_ENV_FILE:-.env}
    networks:
      - news-scraper-network

networks:
  news-scraper-network:
    external: true